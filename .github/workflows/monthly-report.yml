name: Monthly Expense Report

on:
  schedule:
    # Chạy vào lúc 09:00 UTC (16:00 Việt Nam) ngày 1 hàng tháng
    - cron: '0 9 1 * *'

  # Cho phép chạy thủ công từ Actions tab
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env file from secrets
        run: |
          cat > .env << EOF
          NOTION_API_KEY=${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID=${{ secrets.NOTION_DATABASE_ID }}
          GMAIL_EMAIL=${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENTS=${{ secrets.EMAIL_RECIPIENTS }}
          TIMEZONE=${{ secrets.TIMEZONE || 'Asia/Ho_Chi_Minh' }}
          EOF

      - name: Generate and send report
        run: python expense_report.py

      - name: Upload reports as artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: expense-reports
          path: reports/
          retention-days: 90

      - name: Comment on workflow run
        if: always()
        run: |
          echo "✅ Monthly expense report generated successfully!"
          echo "📊 Check artifacts tab for reports and charts"
